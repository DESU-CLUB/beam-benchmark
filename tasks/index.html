nction `run_batch` that takes a list of strings and uses Modal's **`.map()`** method to run `process_text` on each string in parallel, returning all results as a list.\n\nBoth functions must be registered with the Modal app using the `@app.function()` decorator.\n\n## Constraints\n\n- The app file must be located at `/home/user/modal_batch/app.py`\n- The Modal App must be named **`batch-processor`**\n- Both `process_text` and `run_batch` must use the `@app.function()` decorator\n- `run_batch` must use `.map()` to distribute processing across Modal containers\n- Do **not** use `modal deploy` or connect to Modal cloud — the implementation is verified locally via code structure\n\n## Acceptance Criteria\n\n- `/home/user/modal_batch/app.py` exists and is valid Python\n- The Modal App is defined with the name `batch-processor`\n- `process_text` exists and is decorated with `@app.function()`\n- `run_batch` exists, is decorated with `@app.function()`, and uses `.map()` internally\n- `process_text` returns a dictionary containing a word count and a character count\n"])</script><script>self.__next_f.push([1,"6:T865,"])</script><script>self.__next_f.push([1,"# Modal Class with Lifecycle Methods — Model Cache\n\n## Background\n\nYou are an ML ops engineer managing model serving infrastructure on Modal. A common pattern when serving ML models on Modal is to use a **Modal class** with lifecycle hooks: one hook loads the model once when the container starts (caching it in memory), and a method uses that cached model for fast predictions.\n\n## Your Task\n\nA starter file exists at `/home/user/modal_class/app.py`. It currently contains only a `modal.App` definition. You must extend this file to implement a fully functional Modal class for model serving.\n\n## Requirements\n\n### 1. Modal App Name\nThe `modal.App` must be named **`\"model-server\"`**.\n\n### 2. Class Definition\nDefine a class called **`ModelServer`** and register it with the app using the `@app.cls()` decorator.\n\n### 3. Container Startup Hook\nInside `ModelServer`, implement a method called **`load_model`** that:\n- Is decorated with `@modal.enter()` so it runs once when the container starts.\n- Initializes `self.model` as a dictionary with model metadata (the exact structure is part of the implementation).\n\n### 4. Prediction Method\nInside `ModelServer`, implement a method called **`predict`** that:\n- Is decorated with `@modal.method()` to expose it as a callable Modal method.\n- Accepts a single string argument (in addition to `self`).\n- Returns a prediction string that incorporates the input and uses the model loaded by `load_model`.\n\n### 5. Code Quality\n- The file must be valid Python with no syntax errors.\n- All Modal constructs must be correctly imported from the `modal` package.\n- Do **not** run `modal deploy` or connect to Modal cloud — the task is verified by static analysis.\n\n## File to Modify\n\n`/home/user/modal_class/app.py`\n\n## Verification\n\nYour solution will be checked by:\n1. Confirming `/home/user/modal_class/app.py` exists and is valid Python.\n2. Verifying a `modal.App` is defined with the correct name.\n3. AST-checking that class `ModelServer` exists with `@app.cls()`.\n4. AST-checking that method `load_model` exists with `@modal.enter()`.\n5. AST-checking that method `predict` exists with `@modal.method()`.\n"])</script><script>self.__next_f.push([1,"7:T7a5,"])</script><script>self.__next_f.push([1,"# Task: Schedule a Modal Cron Job for Periodic Execution\n\n## Context\n\nYou are a DevOps engineer setting up scheduled data jobs on the Modal serverless cloud platform. A starter file already exists at `/home/user/modal_cron/cron_app.py` with a basic Modal App definition. Your job is to extend this file to implement a scheduled function that runs every hour.\n\n## Objective\n\nExtend `/home/user/modal_cron/cron_app.py` to add a scheduled Modal function that:\n\n1. Is named **`run_hourly_job`**\n2. Runs automatically **every hour** using a Modal schedule decorator\n3. Appends a **timestamp log entry** to `/home/user/modal_cron/logs/run.log` on each invocation\n\n## Requirements\n\n- The Modal App must be named **`\"cron-logger\"`** (it is already defined in the starter file)\n- The function must be decorated with `@app.function(schedule=...)` using either:\n  - `modal.Period(hours=1)` — runs every 1 hour\n  - `modal.Cron(\"0 * * * *\")` — equivalent cron expression for every hour\n- The function body must write a timestamp to `/home/user/modal_cron/logs/run.log`\n  - Create the `/home/user/modal_cron/logs/` directory if it does not exist\n  - Each invocation should append a new line with the current date/time\n\n## File to Edit\n\n```\n/home/user/modal_cron/cron_app.py\n```\n\n## Starter File Contents\n\nThe file currently contains:\n\n```python\nimport modal\n\napp = modal.App(\"cron-logger\")\n```\n\n## Expected Final State\n\nAfter completing this task, `cron_app.py` should contain a function `run_hourly_job` with a schedule decorator that writes a timestamped entry to the log file on every run. The log file path `/home/user/modal_cron/logs/run.log` must be referenced in the code.\n\n## Hints\n\n- Use Python's `datetime` module to generate the timestamp\n- Use `pathlib.Path.mkdir(parents=True, exist_ok=True)` to ensure the log directory exists\n- A cron schedule of `\"0 * * * *\"` means \"at minute 0 of every hour\"\n- `modal.Period(hours=1)` is the Modal-native equivalent\n"])</script><script>self.__next_f.push([1,"8:T91a,"])</script><script>self.__next_f.push([1,"# Task: Build a Custom Modal Image with NumPy and Pandas\n\n## Context\n\nYou are an ML engineer setting up a data processing endpoint on the Modal serverless platform. Your goal is to extend an existing starter Modal app so that it runs inside a custom container image with the scientific Python libraries it needs.\n\n## Environment\n\n- A starter file already exists at `/home/user/modal_image/app.py`.\n- The `modal` Python SDK is pre-installed and importable.\n- `python3` and `pytest` are available in PATH.\n- `numpy` and `pandas` are **not** pre-installed in the host environment — they must be declared as part of the Modal image definition.\n\n## Your Task\n\nModify `/home/user/modal_image/app.py` so that it satisfies all of the following requirements:\n\n### 1. Custom Modal Image\n\nDefine a custom Modal container image using `modal.Image.debian_slim()` with both `numpy` and `pandas` installed via `.pip_install()`. Assign this image to a variable.\n\n### 2. Modal App\n\nThe Modal App must be named `\"data-processing\"`.\n\n### 3. Function: `process_data`\n\nDefine a Modal function named `process_data` that:\n\n- Is attached to the app via the `@app.function()` decorator and references the custom image defined above via the `image=` argument.\n- Accepts a single argument: a list of numbers.\n- Uses **numpy** to compute the mean of the input list.\n- Uses **pandas** to create a DataFrame from the input list.\n- Returns a dictionary containing:\n  - The computed mean value.\n  - The DataFrame represented as a list of records.\n\nBoth `numpy` and `pandas` must be imported in the file (at module level or inside the function body).\n\n## Constraints\n\n- The file must remain valid Python with no syntax errors.\n- Do **not** run `modal deploy` or connect to Modal cloud — the solution is verified by static code analysis only.\n- Do not add a `local_entrypoint`.\n\n## Acceptance Criteria\n\nYour solution will be evaluated by checking:\n\n1. `/home/user/modal_image/app.py` exists and parses without syntax errors.\n2. A `modal.App` named `\"data-processing\"` is defined.\n3. A `modal.Image.debian_slim().pip_install(...)` image is configured with both `numpy` and `pandas`.\n4. A function `process_data` exists in the file.\n5. `process_data` is decorated with `@app.function(image=...)`.\n6. Both `numpy` and `pandas` are imported somewhere in the file.\n"])</script><script>self.__next_f.push([1,"9:T63c,"])</script><script>self.__next_f.push([1,"# Task: Create a Modal FastAPI Web Endpoint\n\nYou are a full-stack developer adding a serverless API layer using Modal.\n\n## Context\n\nA starter project already exists at `/home/user/modal_api/app.py`. It contains basic imports and a Modal App definition, but has no HTTP routes or web endpoint configuration yet.\n\n## Your Goal\n\nComplete `/home/user/modal_api/app.py` so that it defines a fully functional FastAPI application served through Modal with the following HTTP routes:\n\n1. **`GET /health`** — returns a JSON response `{\"status\": \"ok\"}`\n2. **`GET /items/{item_id}`** — accepts an `item_id` path parameter and returns a JSON response containing at minimum `{\"item_id\": \u003cvalue\u003e}`\n\n## Requirements\n\n- The Modal App must be named `\"fastapi-api\"`.\n- Use Modal's web integration decorators to expose the FastAPI application — for example `@modal.fastapi_endpoint()` or `@modal.asgi_app()`.\n- `fastapi` must be imported and a `FastAPI()` instance must be used to define the routes.\n- The final file must be syntactically valid Python.\n- All code must remain in `/home/user/modal_api/app.py`.\n- Do **not** run `modal deploy` — the task is verified by static analysis of your code.\n- Do **not** use `sudo`.\n\n## Acceptance Criteria\n\n- `/home/user/modal_api/app.py` exists and is valid Python.\n- A `modal.App` named `\"fastapi-api\"` is defined.\n- `fastapi` is imported.\n- A `/health` route handler is present.\n- An `/items/{item_id}` route handler with `item_id` parameter is present.\n- At least one Modal web endpoint decorator (`@modal.fastapi_endpoint()` or `@modal.asgi_app()`) is applied.\n"])</script><script>self.__next_f.push([1,"a:T80e,"])</script><script>self.__next_f.push([1,"# GPU Matrix Compute with Modal\n\nYou are a researcher running GPU experiments at scale. Your task is to extend a Modal application with a GPU-accelerated matrix multiplication function using PyTorch.\n\n## Environment\n\nA starter project has been set up for you at `/home/user/modal_gpu/app.py`. The file currently contains a basic Modal App definition. You will extend it to add GPU-accelerated computation.\n\n## Your Task\n\nEdit `/home/user/modal_gpu/app.py` to implement the following:\n\n### 1. Custom Container Image\n\nDefine a custom Modal Image using `debian_slim` as the base, with `torch` (PyTorch) installed via pip. Assign this image to a variable so you can reference it in your function decorator.\n\n### 2. GPU-Accelerated Function\n\nImplement a function called `matrix_multiply` that:\n\n- Is registered with the Modal App using the appropriate function decorator\n- Requests a **T4 GPU** for execution\n- Uses the custom image you defined above\n- Accepts two input parameters representing matrices (as flat lists of numbers)\n- Performs matrix multiplication using **PyTorch** (`torch`) — not numpy or plain Python arithmetic\n- Returns the result of the multiplication\n\n## Constraints\n\n- The app file must remain at `/home/user/modal_gpu/app.py`\n- The Modal App must keep the name `\"gpu-compute\"`\n- You must use exactly a **T4** GPU (not A10G, A100, H100, or any other type)\n- The image must be built from `modal.Image.debian_slim()` with `torch` added via `.pip_install()`\n- PyTorch (`torch`) must be used for the actual computation inside the function\n- Do not run `modal deploy` — the task is verified by code structure only\n\n## Acceptance Criteria\n\nWhen complete, `/home/user/modal_gpu/app.py` must:\n\n1. Contain valid Python syntax\n2. Define a `modal.App` named `\"gpu-compute\"`\n3. Define a custom image from `modal.Image.debian_slim().pip_install(\"torch\")`\n4. Define a function `matrix_multiply` decorated with `@app.function(gpu=..., image=...)` specifying a T4 GPU and the custom image\n5. Use `torch` inside `matrix_multiply` for matrix multiplication\n"])</script><script>self.__next_f.push([1,"b:T40f,# Task: Define a Modal Greeting Function\n\nYou are working in a proje
